name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run tests
        run: pytest -q

      - name: Run demo workflow
        run: |
          python titanius_cli.py run lead_recovery_audit --input samples/leads_demo.v1.json --mode report --output-json reports/ci.lead_recovery.json --output-md reports/ci.lead_recovery.md
